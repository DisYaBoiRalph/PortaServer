name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── CodeQL SAST (non-blocking) ─────────────────────────────────────────────
  codeql:
    name: CodeQL (SAST)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin

      - name: Compile Kotlin/Java for CodeQL
        continue-on-error: true
        run: chmod +x gradlew && ./gradlew compileDebugKotlin --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:java-kotlin

  # ── Release APK build ──────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK (NDK + CMake)
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            ndk;27.2.12479018
            cmake;3.22.1

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-

      - name: Cache CMake / llama.cpp build artifacts
        uses: actions/cache@v4
        with:
          path: app/.cxx
          key: cxx-${{ runner.os }}-${{ hashFiles('app/src/main/cpp/CMakeLists.txt') }}
          restore-keys: |
            cxx-${{ runner.os }}-

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV
          echo "APK_NAME=portaserver-${VERSION}-${SHORT_SHA}.apk" >> $GITHUB_ENV
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/portaserver-${VERSION}-${SHORT_SHA}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: portaserver-release
          path: app/build/outputs/apk/release/portaserver-*.apk
          retention-days: 30

      - name: Publish GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: v${{ env.VERSION }}-${{ env.SHORT_SHA }}
          files: app/build/outputs/apk/release/portaserver-*.apk
          generate_release_notes: true
